services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-project-api
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      RAG_USE_REDIS: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-project-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./ai-frontend
      dockerfile: Dockerfile
    container_name: ai-project-frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    container_name: neo4j_db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s
    restart: unless-stopped

volumes:
  redis_data:
  neo4j_data:
  neo4j_logs:
